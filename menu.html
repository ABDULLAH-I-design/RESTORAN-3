<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Menu - Restaurant</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style/styles.css">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>

<body>

<!-- HEADER -->
<header class="header">

    <a href="index.html" class="logo">
        <img src="images/logo.png" alt="Logo">
    </a>

    <nav class="navbar">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="menu.html" class="active">Menu</a>
        <a href="blogs.html">Blogs</a>
        <a href="review.html">Review</a>
        <a href="products.html">Products</a>
        <a href="contact.html">Contact</a>
    </nav>

    <div class="buttons">
        <button id="cart-btn">
            <i class="fas fa-shopping-cart"></i>
            <span id="cart-count">0</span>
        </button>

        <button id="menu-btn">
            <i class="fas fa-bars"></i>
        </button>
    </div>

    <!-- CART -->
    <div class="cart-items-container">
        <div class="cart-total">
            <a href="#" class="btn checkout-btn">checkout now</a>
        </div>
    </div>

</header>

<!-- MENU SECTION -->
<section class="menu" id="menu">

    <h1 class="heading">OUR <span>MENU</span></h1>

    <div class="box-container">

        <div class="box">
            <div class="box-head">
                <img src="images/menu-1.png" alt="">
                <span class="menu-category">PIZZA</span>
                <h3>6 MINI PIZZA</h3>
                <div class="price">104$</div>
            </div>
            <div class="box-bottum">
                <a href="#" class="btn add-to-cart" data-name="6 MINI PIZZA" data-price="104">Add to cart</a>
            </div>
        </div>

        <div class="box">
            <div class="box-head">
                <img src="images/menu-2.png" alt="">
                <span class="menu-category">BURGER</span>
                <h3>5 MINI BURGER</h3>
                <div class="price">104$</div>
            </div>
            <div class="box-bottum">
                <a href="#" class="btn add-to-cart" data-name="5 MINI BURGER" data-price="104">Add to cart</a>
            </div>
        </div>

        <div class="box">
            <div class="box-head">
                <img src="images/menu-3.png" alt="">
                <span class="menu-category">PIZZA</span>
                <h3>2 MIXED PIZZA</h3>
                <div class="price">49$</div>
            </div>
            <div class="box-bottum">
                <a href="#" class="btn add-to-cart" data-name="2 MIXED PIZZA" data-price="49">Add to cart</a>
            </div>
        </div>

        <div class="box">
            <div class="box-head">
                <img src="images/menu-4.png" alt="">
                <span class="menu-category">BURGER</span>
                <h3>3 MEATBALL BURGER</h3>
                <div class="price">22$</div>
            </div>
            <div class="box-bottum">
                <a href="#" class="btn add-to-cart" data-name="3 MEATBALL BURGER" data-price="22">Add to cart</a>
            </div>
        </div>

    </div>

</section>

<!-- FOOTER (اختياري) -->
<section class="footer">

    <div class="credit">
        created by <span>Your Name</span> | all rights reserved
    </div>

</section>

<!-- JS (مهم جداً للسلة) -->
<script src="js/script.js"></script>

</body>
</html>
