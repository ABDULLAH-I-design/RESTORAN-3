<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>

    <link rel="stylesheet" href="style/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body>

<header class="header">
    <a href="index.html" class="logo">
        <img src="images/logo.png" alt="Logo">
    </a>

    <nav class="navbar active">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="menu.html">Menu</a>
        <a href="contact.html" class="active">Contact</a>
    </nav>
</header>


<section class="contact" id="contact">
    <h1 class="heading">Contact <span>Us</span></h1>

    <div class="row">
        <iframe class="maps"
            src="https://www.google.com/maps/embed?pb=!1m16!1m12!1m3!1d6019.022993009116!2d28.98234765!3d41.03594225!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!2m1!1sExplore%20Taksim%20Square%2C%20Istanbul%2C%20Turkey!5e0!3m2!1sar!2str!4v1764097196327!5m2!1sar!2str">
        </iframe>

        <form>
            <h3>Get In Touch</h3>

            <div class="inputBox">
                <i class="fas fa-user"></i>
                <input type="text" placeholder="name">
            </div>

            <div class="inputBox">
                <i class="fas fa-envelope"></i>
                <input type="email" placeholder="email">
            </div>

            <div class="inputBox">
                <i class="fas fa-phone"></i>
                <input type="number" placeholder="phone">
            </div>

            <input type="submit" class="btn" value="Contact Now">
        </form>
    </div>
</section>


<section class="footer">
    <div class="credit">
        created by <span>Emin BasBayan</span> | all rights reserved
    </div>
</section>

<script src="js/script.js"></script>
</body>
</html>
